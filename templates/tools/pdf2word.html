<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="PDF 转 Word — 高保真表格与图片转换" />
  <title>PDF 转 Word — 工具箱</title>
  <link rel="stylesheet" href="{{ static_url('/static/css/tokens.css') }}" />
  <link rel="stylesheet" href="{{ static_url('/static/css/layout.css') }}" />
  <style>
    :root {
      --c: #4f46e5;
      --c2: #6366f1;
      --c-soft: #eef2ff;
      --c-border: #c7d2fe;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--font);
      color: var(--ink);
      min-height: 100vh;
      background: var(--bg);
    }
    .bg {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background:
        radial-gradient(ellipse 80% 55% at 12% 8%, rgba(99, 102, 241, 0.3), transparent 55%),
        radial-gradient(ellipse 60% 45% at 92% 12%, rgba(139, 92, 246, 0.16), transparent 50%),
        radial-gradient(ellipse 50% 40% at 50% 100%, rgba(99, 102, 241, 0.1), transparent 55%),
        linear-gradient(165deg, #f0f4ff 0%, #eef2f7 45%, #f5f7fb 100%);
    }
    .bg::before {
      content: "";
      position: absolute; inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.45) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.45) 1px, transparent 1px);
      background-size: 48px 48px;
      mask-image: radial-gradient(ellipse 70% 55% at 50% 35%, black 15%, transparent 75%);
      opacity: 0.5;
    }

    /* Inner form uses full shared column width */
    .shell {
      position: relative;
      z-index: 1;
      width: 100%;
    }
    .nav {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 16px; gap: 12px;
    }
    .back {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 13px; font-weight: 600; color: var(--muted);
      text-decoration: none; padding: 8px 12px;
      background: var(--surface); border: 1px solid var(--line);
      border-radius: 999px; backdrop-filter: blur(10px);
      transition: color .15s, border-color .15s, background .15s;
    }
    .back:hover { color: var(--c); border-color: var(--c-border); background: #fff; }
    .back svg { width: 15px; height: 15px; }
    .chip {
      font-size: 11px; font-weight: 700; color: var(--c);
      background: var(--c-soft); border: 1px solid var(--c-border);
      padding: 6px 11px; border-radius: 999px;
    }

    .card {
      background: #fff;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 28px 28px 24px;
      overflow: hidden;
      position: relative;
    }
    .card::before {
      content: "";
      position: absolute; left: 0; right: 0; top: 0; height: 3px;
      background: linear-gradient(90deg, var(--c), var(--c2), #8b5cf6);
    }
    .card-head {
      display: flex; gap: 14px; align-items: flex-start;
      margin-bottom: 22px;
    }
    .icon {
      width: 52px; height: 52px; border-radius: 16px; flex-shrink: 0;
      display: grid; place-items: center; font-size: 24px;
      background: linear-gradient(145deg, var(--c2), var(--c));
      box-shadow: 0 10px 24px rgba(79, 70, 229, 0.35),
        inset 0 1px 0 rgba(255,255,255,0.28);
    }
    .card-head h1 {
      font-size: 1.35rem; font-weight: 800; letter-spacing: -0.03em;
      color: var(--ink); margin-bottom: 6px; line-height: 1.2;
    }
    .card-head p {
      font-size: 13px; line-height: 1.6; color: var(--muted);
    }

    .features {
      display: flex; flex-wrap: wrap; gap: 6px;
      margin: -6px 0 20px;
    }
    .feat {
      font-size: 11px; font-weight: 600; color: #475569;
      background: #f8fafc; border: 1px solid #eef2f7;
      padding: 4px 9px; border-radius: 8px;
    }

    .drop {
      display: block; width: 100%; cursor: pointer;
      border: 2px dashed var(--c-border);
      border-radius: 16px; padding: 32px 18px;
      text-align: center; background: linear-gradient(180deg, #fafbff 0%, #f5f7ff 100%);
      transition: border-color .15s, background .15s, box-shadow .15s;
    }
    .drop:hover, .drop.drag {
      border-color: var(--c);
      background: var(--c-soft);
      box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.08);
    }
    .drop-icon {
      width: 48px; height: 48px; margin: 0 auto 12px;
      border-radius: 14px; display: grid; place-items: center;
      background: #fff; border: 1px solid var(--c-border);
      color: var(--c); box-shadow: var(--shadow-sm);
    }
    .drop-icon svg { width: 22px; height: 22px; }
    .drop-title { font-size: 14px; font-weight: 600; color: var(--ink-2); }
    .drop-title strong { color: var(--c); }
    .drop-hint { margin-top: 6px; font-size: 12px; color: var(--muted-2); }
    input[type=file] { display: none; }

    .file-list {
      margin: 12px 0 0; padding: 0; list-style: none;
      max-height: 168px; overflow: auto;
    }
    .file-list li {
      display: flex; align-items: center; gap: 10px;
      font-size: 12px; color: var(--ink-2);
      padding: 10px 12px; margin-bottom: 6px;
      background: #f8fafc; border: 1px solid #eef2f7; border-radius: 12px;
    }
    .file-list .fi {
      width: 32px; height: 32px; border-radius: 9px; flex-shrink: 0;
      display: grid; place-items: center; font-size: 14px;
      background: var(--c-soft); color: var(--c);
    }
    .file-list .fname {
      flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
      font-weight: 600;
    }
    .file-list .fsize { color: var(--muted-2); flex-shrink: 0; font-size: 11px; }
    .file-list button {
      border: 0; background: transparent; color: var(--muted-2);
      font-size: 12px; font-weight: 600; cursor: pointer;
      padding: 4px 8px; border-radius: 8px;
    }
    .file-list button:hover { color: #dc2626; background: #fef2f2; }

    .opts {
      margin-top: 16px; display: grid; gap: 14px;
      padding: 16px; background: #f8fafc;
      border: 1px solid #eef2f7; border-radius: 16px;
    }
    .opts-title {
      font-size: 11px; font-weight: 700; letter-spacing: 0.04em;
      text-transform: uppercase; color: var(--muted-2);
    }
    .opts label.field {
      display: flex; flex-direction: column; gap: 6px;
      font-size: 12px; font-weight: 600; color: #475569;
    }
    .opts input[type=text] {
      padding: 10px 12px; border: 1px solid #e2e8f0; border-radius: 11px;
      font-size: 13px; font-weight: 500; outline: none; background: #fff;
      color: var(--ink); transition: border-color .15s, box-shadow .15s;
    }
    .opts input[type=text]:focus {
      border-color: var(--c2);
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.15);
    }
    .opts .hint { color: var(--muted-2); font-size: 11px; font-weight: 500; }
    .opts .check {
      display: flex; align-items: center; gap: 10px;
      font-size: 13px; font-weight: 600; color: var(--ink-2); cursor: pointer;
    }
    .opts .check input {
      width: 16px; height: 16px; accent-color: var(--c); cursor: pointer;
    }

    #btn {
      width: 100%; margin-top: 18px; padding: 13px 16px; border: 0;
      border-radius: 14px; font-size: 15px; font-weight: 700; cursor: pointer;
      color: #fff;
      background: linear-gradient(135deg, var(--c) 0%, var(--c2) 100%);
      box-shadow: 0 8px 20px rgba(79, 70, 229, 0.32);
      transition: transform .15s, box-shadow .15s, opacity .15s;
    }
    #btn:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 12px 28px rgba(79, 70, 229, 0.4);
    }
    #btn:disabled {
      background: #e2e8f0; color: #94a3b8; box-shadow: none;
      cursor: not-allowed; transform: none;
    }

    .progress {
      display: none; margin-top: 14px; height: 7px;
      background: #eef2f7; border-radius: 999px; overflow: hidden;
    }
    .progress.show { display: block; }
    .progress > i {
      display: block; height: 100%; width: 0%;
      background: linear-gradient(90deg, var(--c), var(--c2), #a78bfa);
      border-radius: 999px; transition: width .15s ease;
    }

    #status {
      margin-top: 14px; font-size: 13px; min-height: 20px; line-height: 1.55;
      font-weight: 500;
    }
    #status:not(:empty) {
      padding: 10px 12px; border-radius: 12px; background: #f8fafc;
      border: 1px solid #eef2f7;
    }
    #status.err { color: #b91c1c; background: #fef2f2; border-color: #fecaca; }
    #status.ok { color: #15803d; background: #f0fdf4; border-color: #bbf7d0; }
    #status.info { color: #334155; }
    #status.warn { color: #b45309; background: #fffbeb; border-color: #fde68a; }

    @keyframes enter {
      from { opacity: 0; transform: translateY(14px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @media (max-width: 480px) {
      .card { padding: 22px 18px 18px; }
      .card-head { gap: 12px; }
      .icon { width: 46px; height: 46px; border-radius: 14px; font-size: 22px; }
    }
    @media (prefers-reduced-motion: reduce) {
      .shell { animation: none; }
      #btn { transition: none; }
    }
  </style>
  <script>window.__ROOT__ = {{ root_path()|tojson }};</script>
  <script src="{{ static_url('/static/js/upload.js') }}"></script>
</head>
<body>
  <div class="bg" aria-hidden="true"></div>
  <div class="tool-shell">
  <div class="shell">
    <div class="nav">
      <a class="back" href="{{ url_path('/c/document') }}">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M19 12H5M11 18l-6-6 6-6"/>
        </svg>
        文档处理
      </a>
      <span class="chip">PDF → Word</span>
    </div>

    <div class="card">
      <div class="card-head">
        <div class="icon" aria-hidden="true">📄</div>
        <div>
          <h1>PDF → Word 转换器</h1>
          <p>纯文本 / 表格高保真转换；支持多文件、页码范围、图片嵌入。扫描件可嵌入图片，或可选 OCR 生成可编辑文字。</p>
        </div>
      </div>

      <div class="features">
        <span class="feat">合并单元格</span>
        <span class="feat">图片嵌入</span>
        <span class="feat">可选 OCR</span>
        <span class="feat">页码范围</span>
        <span class="feat">批量 ZIP</span>
      </div>

      <label class="drop" id="drop">
        <input type="file" id="file" accept="application/pdf,.pdf" multiple />
        <div class="drop-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 16V4M7 9l5-5 5 5"/>
            <path d="M4 16v2a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-2"/>
          </svg>
        </div>
        <div class="drop-title">点击或拖拽 <strong>PDF 文件</strong> 到此处</div>
        <div class="drop-hint">最多 20 个 · 每个 ≤ 50 MB · 大文件 / OCR 可能需数分钟</div>
      </label>
      <ul class="file-list" id="list"></ul>

      <div class="opts">
        <div class="opts-title">转换选项</div>
        <label class="field">
          页码范围（可选）
          <input type="text" id="pageRange" placeholder="例如 1-3,5 （留空=全部）" />
          <span class="hint">1 起始；逗号分隔；支持区间。批量时对每个文件生效。</span>
        </label>
        <label class="check">
          <input type="checkbox" id="pageBreaks" checked />
          在 Word 中按 PDF 分页插入分页符
        </label>
        <label class="check" id="ocrLabel" title="需要本机安装 Tesseract">
          <input type="checkbox" id="ocrEnabled" {% if ocr and ocr.available %}{% else %}disabled{% endif %} />
          扫描页启用 OCR（可编辑文字）
          <span class="hint" id="ocrHint" style="display:block;margin-top:4px;font-weight:400">
            {% if ocr and ocr.available %}
              Tesseract 可用{% if ocr.lang %} · 语言 {{ ocr.lang }}{% endif %}
            {% else %}
              未检测到 Tesseract（安装后并 pip install pytesseract 可用）
            {% endif %}
          </span>
        </label>
      </div>

      <button id="btn" disabled>开始转换</button>
      <div class="progress" id="progress"><i id="bar"></i></div>
      <div id="status"></div>
    </div>
  </div>
  </div>

  <script>
    const MAX_FILES = 20;
    const MAX_BYTES = 50 * 1024 * 1024;
    const LS_KEY = 'pdf2word_opts_v1';
    const fileInput = document.getElementById('file');
    const drop = document.getElementById('drop');
    const list = document.getElementById('list');
    const btn = document.getElementById('btn');
    const status = document.getElementById('status');
    const pageRange = document.getElementById('pageRange');
    const pageBreaks = document.getElementById('pageBreaks');
    const ocrEnabled = document.getElementById('ocrEnabled');
    const progress = document.getElementById('progress');
    const bar = document.getElementById('bar');

    /** @type {File[]} */
    let selected = [];

    try {
      const saved = JSON.parse(localStorage.getItem(LS_KEY) || '{}');
      if (typeof saved.pageRange === 'string') pageRange.value = saved.pageRange;
      if (typeof saved.pageBreaks === 'boolean') pageBreaks.checked = saved.pageBreaks;
      if (typeof saved.ocr === 'boolean' && ocrEnabled && !ocrEnabled.disabled) {
        ocrEnabled.checked = saved.ocr;
      }
    } catch (e) { /* ignore */ }

    function persistOpts() {
      try {
        localStorage.setItem(LS_KEY, JSON.stringify({
          pageRange: pageRange.value,
          pageBreaks: pageBreaks.checked,
          ocr: !!(ocrEnabled && ocrEnabled.checked),
        }));
      } catch (e) { /* ignore */ }
    }
    pageRange.addEventListener('change', persistOpts);
    pageRange.addEventListener('blur', persistOpts);
    pageBreaks.addEventListener('change', persistOpts);
    if (ocrEnabled) ocrEnabled.addEventListener('change', persistOpts);

    const {
      fmtSize, downloadName, xhrPost, bindDropZone, saveBlob, xhrErrorMessage, appUrl,
      submitJobAndDownload, isAsyncFallbackError,
    } = window.ToolkitUpload;

    function setProgress(pct) {
      progress.classList.add('show');
      bar.style.width = Math.max(0, Math.min(100, pct)) + '%';
    }
    function hideProgress() {
      progress.classList.remove('show');
      bar.style.width = '0%';
    }

    function renderList() {
      list.innerHTML = '';
      selected.forEach((f, i) => {
        const li = document.createElement('li');
        const icon = document.createElement('span');
        icon.className = 'fi';
        icon.textContent = '📄';
        icon.setAttribute('aria-hidden', 'true');
        const name = document.createElement('span');
        name.className = 'fname';
        name.title = f.name;
        name.textContent = f.name;
        const size = document.createElement('span');
        size.className = 'fsize';
        size.textContent = fmtSize(f.size);
        const rm = document.createElement('button');
        rm.type = 'button';
        rm.textContent = '移除';
        rm.addEventListener('click', (e) => {
          e.preventDefault();
          e.stopPropagation();
          selected.splice(i, 1);
          renderList();
          status.textContent = '';
          status.className = '';
        });
        li.append(icon, name, size, rm);
        list.appendChild(li);
      });
      btn.disabled = selected.length === 0;
      btn.textContent = selected.length > 1
        ? `开始转换（${selected.length} 个文件 → ZIP）`
        : '开始转换';
    }

    function addFiles(fileList) {
      const incoming = Array.from(fileList || []);
      const errors = [];
      for (const f of incoming) {
        if (!f.name.toLowerCase().endsWith('.pdf')) {
          errors.push(`${f.name}: 仅支持 PDF`);
          continue;
        }
        if (f.size > MAX_BYTES) {
          errors.push(`${f.name}: 超过 50 MB`);
          continue;
        }
        if (f.size === 0) {
          errors.push(`${f.name}: 空文件`);
          continue;
        }
        const dup = selected.some(s => s.name === f.name && s.size === f.size);
        if (dup) continue;
        if (selected.length >= MAX_FILES) {
          errors.push(`最多 ${MAX_FILES} 个文件`);
          break;
        }
        selected.push(f);
      }
      renderList();
      if (errors.length) {
        status.className = 'err';
        status.textContent = errors.join('；');
      } else {
        status.textContent = '';
        status.className = '';
      }
      fileInput.value = '';
    }

    bindDropZone({ drop, input: fileInput, onFiles: addFiles });

    btn.addEventListener('click', async () => {
      if (!selected.length) return;
      persistOpts();
      btn.disabled = true;
      status.className = 'info';
      status.textContent = selected.length > 1
        ? `批量转换中（${selected.length} 个）…`
        : '准备上传…';
      setProgress(2);

      const fd = new FormData();
      const multi = selected.length > 1;
      if (multi) {
        selected.forEach(f => fd.append('files', f));
      } else {
        fd.append('file', selected[0]);
      }
      const range = pageRange.value.trim();
      if (range) fd.append('page_range', range);
      fd.append('page_breaks', pageBreaks.checked ? 'true' : 'false');
      if (ocrEnabled && ocrEnabled.checked && !ocrEnabled.disabled) {
        fd.append('ocr', 'true');
      }

      // Prefer async job API (202 + poll) so reverse-proxy timeouts are less painful.
      // Fall back to synchronous convert if the async route is unavailable.
      const asyncUrl = appUrl(multi
        ? '/tools/pdf2word/convert-batch-async'
        : '/tools/pdf2word/convert-async');
      const syncUrl = appUrl(multi
        ? '/tools/pdf2word/convert-batch'
        : '/tools/pdf2word/convert');
      const fallbackName = multi
        ? 'pdf2word_batch.zip'
        : selected[0].name.replace(/\.pdf$/i, '') + '.docx';
      const useOcr = !!(ocrEnabled && ocrEnabled.checked && !ocrEnabled.disabled);
      const processHint = multi
        ? `上传完成，批量任务已提交（${selected.length} 个）…`
        : (useOcr
          ? '上传完成，任务已提交（含 OCR）… 扫描件可能需数分钟'
          : '上传完成，任务已提交… 复杂表格可能较慢');

      try {
        let pages = '?';
        let tables = '0';
        let images = '0';
        let files = multi ? String(selected.length) : null;
        let warns = [];

        try {
          const got = await submitJobAndDownload(asyncUrl, fd, {
            onProgress: (pct) => setProgress(pct),
            onStatus: (text, cls) => { status.className = cls || 'info'; status.textContent = text; },
            processHint,
            fallbackName,
          });
          const h = got.headers;
          pages = h.get('X-Pages') || (got.job.result && got.job.result.pages) || pages;
          tables = h.get('X-Tables') || (got.job.result && got.job.result.tables) || tables;
          images = h.get('X-Images') || (got.job.result && got.job.result.images) || images;
          files = h.get('X-Files') || (got.job.result && got.job.result.files) || files;
          const wHead = h.get('X-Warnings') || '';
          warns = wHead
            ? wHead.split(',').filter(Boolean)
            : ((got.job.result && got.job.result.warnings) || []);
        } catch (asyncErr) {
          // Only infrastructure failures (network / missing async route) may use sync.
          // Business errors (bad PDF, OCR unavailable, job conversion failed) must not.
          if (!isAsyncFallbackError(asyncErr)) {
            throw asyncErr;
          }
          status.className = 'info';
          status.textContent = '改用同步转换…';
          // FormData body can only be consumed once in some browsers after XHR send;
          // rebuild from the same selected files.
          const fd2 = new FormData();
          if (multi) {
            selected.forEach(f => fd2.append('files', f));
          } else {
            fd2.append('file', selected[0]);
          }
          if (range) fd2.append('page_range', range);
          fd2.append('page_breaks', pageBreaks.checked ? 'true' : 'false');
          if (useOcr) fd2.append('ocr', 'true');
          const xhr = await xhrPost(syncUrl, fd2, {
            onProgress: (pct) => setProgress(pct),
            onStatus: (text, cls) => { status.className = cls || 'info'; status.textContent = text; },
            processHint: multi
              ? `上传完成，正在批量转换 ${selected.length} 个文件… 请勿关闭页面`
              : (useOcr
                ? '上传完成，正在转换（含 OCR）… 扫描件可能需数分钟，请勿关闭页面'
                : '上传完成，正在转换… 复杂表格可能较慢，请勿关闭页面'),
            longWaitSec: 15,
          });
          if (xhr.status < 200 || xhr.status >= 300) {
            throw new Error(await xhrErrorMessage(xhr));
          }
          saveBlob(xhr.response, downloadName(xhr.getResponseHeader('content-disposition'), fallbackName));
          pages = xhr.getResponseHeader('X-Pages') || pages;
          tables = xhr.getResponseHeader('X-Tables') || tables;
          images = xhr.getResponseHeader('X-Images') || images;
          files = xhr.getResponseHeader('X-Files') || files;
          warns = (xhr.getResponseHeader('X-Warnings') || '').split(',').filter(Boolean);
        }

        const doneCount = multi ? (files || selected.length) : 1;
        // Clear selection so the page is ready for the next job.
        selected = [];
        fileInput.value = '';
        renderList();

        let line = multi
          ? `完成：${doneCount} 个文件，共 ${pages} 页、${tables} 个表格、${images} 张图。`
          : `完成：${pages} 页、${tables} 个表格、${images} 张图，文件已下载。`;
        if (warns.includes('image_only')) {
          status.className = 'warn';
          status.textContent = line + ' 提示：检测到纯图片/扫描页，已按图片嵌入（无 OCR）。';
        } else {
          status.className = 'ok';
          status.textContent = line;
        }
      } catch (e) {
        status.className = 'err';
        status.textContent = e.message || String(e);
      } finally {
        hideProgress();
        btn.disabled = selected.length === 0;
      }
    });
  </script>
</body>
</html>
