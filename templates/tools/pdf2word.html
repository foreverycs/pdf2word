<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PDF 转 Word — 工具箱</title>
  <style>
    :root { color-scheme: light; }
    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0; font-family: -apple-system, "Segoe UI", "Microsoft YaHei", sans-serif;
      background: linear-gradient(135deg, #eef2ff 0%, #f4f6fb 100%);
      color: #1f2937;
      display: flex; min-height: 100vh; padding: 24px;
    }
    .card {
      margin: auto;
      background: #fff; padding: 32px 36px; border-radius: 16px;
      width: min(520px, 94vw);
      box-shadow: 0 10px 40px rgba(0,0,0,.08);
    }
    .back { display: inline-block; margin-bottom: 16px; color: #4f46e5; text-decoration: none; font-size: 13px; }
    .back:hover { text-decoration: underline; }
    h1 { font-size: 20px; margin: 0 0 6px; }
    p.sub { margin: 0 0 20px; color: #6b7280; font-size: 13px; line-height: 1.5; }
    .drop {
      display: block; width: 100%;
      border: 2px dashed #c7d2fe; border-radius: 12px; padding: 28px 16px;
      text-align: center; cursor: pointer; transition: .15s; background: #fafbff;
    }
    .drop:hover, .drop.drag { border-color: #6366f1; background: #eef2ff; }
    .drop strong { color: #4f46e5; }
    input[type=file] { display: none; }
    .file-list {
      margin: 12px 0 0; padding: 0; list-style: none; max-height: 160px; overflow: auto;
    }
    .file-list li {
      display: flex; align-items: center; gap: 8px;
      font-size: 12px; color: #374151; padding: 6px 8px;
      background: #f9fafb; border-radius: 8px; margin-bottom: 6px;
    }
    .file-list .fname { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .file-list .fsize { color: #9ca3af; flex-shrink: 0; }
    .file-list button {
      width: auto; margin: 0; padding: 2px 8px; font-size: 12px;
      background: transparent; color: #9ca3af; border-radius: 6px;
    }
    .file-list button:hover { color: #dc2626; background: #fef2f2; }
    .opts {
      margin-top: 16px; display: grid; gap: 12px;
      padding: 14px 14px 4px; background: #f9fafb; border-radius: 12px;
    }
    .opts label.field {
      display: flex; flex-direction: column; gap: 4px;
      font-size: 12px; color: #4b5563;
    }
    .opts input[type=text] {
      padding: 8px 10px; border: 1px solid #e5e7eb; border-radius: 8px;
      font-size: 13px; outline: none;
    }
    .opts input[type=text]:focus { border-color: #a5b4fc; box-shadow: 0 0 0 3px #eef2ff; }
    .opts .hint { color: #9ca3af; font-size: 11px; }
    .opts .check {
      display: flex; align-items: center; gap: 8px;
      font-size: 13px; color: #374151; cursor: pointer;
    }
    .opts .check input { width: 15px; height: 15px; accent-color: #4f46e5; }
    #btn {
      width: 100%; margin-top: 18px; padding: 11px; border: 0; border-radius: 10px;
      background: #4f46e5; color: #fff; font-size: 15px; cursor: pointer;
    }
    #btn:disabled { background: #c7c9d9; cursor: not-allowed; }
    .progress {
      display: none; margin-top: 14px; height: 6px; background: #e5e7eb;
      border-radius: 999px; overflow: hidden;
    }
    .progress.show { display: block; }
    .progress > i {
      display: block; height: 100%; width: 0%;
      background: linear-gradient(90deg, #6366f1, #818cf8);
      transition: width .15s ease;
    }
    #status { margin-top: 12px; font-size: 13px; min-height: 18px; line-height: 1.5; }
    .err { color: #dc2626; }
    .ok { color: #16a34a; }
    .info { color: #4b5563; }
    .warn { color: #d97706; }
  </style>
</head>
<body>
  <div class="card">
    <a class="back" href="/">&larr; 返回工具箱</a>
    <h1>PDF → Word 转换器</h1>
    <p class="sub">纯文本 / 表格高保真转换；支持多文件、页码范围、图片嵌入。扫描件将按图片写入（无 OCR）。</p>

    <label class="drop" id="drop">
      <input type="file" id="file" accept="application/pdf,.pdf" multiple />
      <div>点击或拖拽 <strong>PDF 文件</strong> 到此处</div>
      <div style="margin-top:6px;color:#9ca3af;font-size:12px;">最多 20 个，每个 ≤ 50 MB</div>
    </label>
    <ul class="file-list" id="list"></ul>

    <div class="opts">
      <label class="field">
        页码范围（可选）
        <input type="text" id="pageRange" placeholder="例如 1-3,5 （留空=全部）" />
        <span class="hint">1 起始；逗号分隔；支持区间。批量时对每个文件生效。</span>
      </label>
      <label class="check">
        <input type="checkbox" id="pageBreaks" checked />
        在 Word 中按 PDF 分页插入分页符
      </label>
    </div>

    <button id="btn" disabled>开始转换</button>
    <div class="progress" id="progress"><i id="bar"></i></div>
    <div id="status"></div>
  </div>

  <script>
    const MAX_FILES = 20;
    const MAX_BYTES = 50 * 1024 * 1024;
    const LS_KEY = 'pdf2word_opts_v1';
    const fileInput = document.getElementById('file');
    const drop = document.getElementById('drop');
    const list = document.getElementById('list');
    const btn = document.getElementById('btn');
    const status = document.getElementById('status');
    const pageRange = document.getElementById('pageRange');
    const pageBreaks = document.getElementById('pageBreaks');
    const progress = document.getElementById('progress');
    const bar = document.getElementById('bar');

    /** @type {File[]} */
    let selected = [];

    try {
      const saved = JSON.parse(localStorage.getItem(LS_KEY) || '{}');
      if (typeof saved.pageRange === 'string') pageRange.value = saved.pageRange;
      if (typeof saved.pageBreaks === 'boolean') pageBreaks.checked = saved.pageBreaks;
    } catch (e) { /* ignore */ }

    function persistOpts() {
      try {
        localStorage.setItem(LS_KEY, JSON.stringify({
          pageRange: pageRange.value,
          pageBreaks: pageBreaks.checked,
        }));
      } catch (e) { /* ignore */ }
    }
    pageRange.addEventListener('change', persistOpts);
    pageRange.addEventListener('blur', persistOpts);
    pageBreaks.addEventListener('change', persistOpts);

    function fmtSize(n) {
      if (n < 1024) return n + ' B';
      if (n < 1024 * 1024) return (n / 1024).toFixed(1) + ' KB';
      return (n / (1024 * 1024)).toFixed(1) + ' MB';
    }

    function downloadName(disposition, fallback) {
      if (!disposition) return fallback;
      const star = /filename\*=(?:UTF-8'')?([^;]+)/i.exec(disposition);
      if (star) {
        try { return decodeURIComponent(star[1].replace(/\+/g, ' ')); }
        catch (e) { /* fall through */ }
      }
      const ascii = /filename="?([^";]+)"?/i.exec(disposition);
      if (ascii) return ascii[1];
      return fallback;
    }

    function errDetail(detail) {
      if (typeof detail === 'string') return detail;
      if (Array.isArray(detail)) {
        return detail.map(d => d.msg || JSON.stringify(d)).join('; ');
      }
      return '转换失败';
    }

    function setProgress(pct) {
      progress.classList.add('show');
      bar.style.width = Math.max(0, Math.min(100, pct)) + '%';
    }
    function hideProgress() {
      progress.classList.remove('show');
      bar.style.width = '0%';
    }

    function renderList() {
      list.innerHTML = '';
      selected.forEach((f, i) => {
        const li = document.createElement('li');
        const name = document.createElement('span');
        name.className = 'fname';
        name.title = f.name;
        name.textContent = f.name;
        const size = document.createElement('span');
        size.className = 'fsize';
        size.textContent = fmtSize(f.size);
        const rm = document.createElement('button');
        rm.type = 'button';
        rm.textContent = '移除';
        rm.addEventListener('click', (e) => {
          e.preventDefault();
          e.stopPropagation();
          selected.splice(i, 1);
          renderList();
          status.textContent = '';
          status.className = '';
        });
        li.append(name, size, rm);
        list.appendChild(li);
      });
      btn.disabled = selected.length === 0;
      btn.textContent = selected.length > 1
        ? `开始转换（${selected.length} 个文件 → ZIP）`
        : '开始转换';
    }

    function addFiles(fileList) {
      const incoming = Array.from(fileList || []);
      const errors = [];
      for (const f of incoming) {
        if (!f.name.toLowerCase().endsWith('.pdf')) {
          errors.push(`${f.name}: 仅支持 PDF`);
          continue;
        }
        if (f.size > MAX_BYTES) {
          errors.push(`${f.name}: 超过 50 MB`);
          continue;
        }
        if (f.size === 0) {
          errors.push(`${f.name}: 空文件`);
          continue;
        }
        const dup = selected.some(s => s.name === f.name && s.size === f.size);
        if (dup) continue;
        if (selected.length >= MAX_FILES) {
          errors.push(`最多 ${MAX_FILES} 个文件`);
          break;
        }
        selected.push(f);
      }
      renderList();
      if (errors.length) {
        status.className = 'err';
        status.textContent = errors.join('；');
      } else {
        status.textContent = '';
        status.className = '';
      }
      fileInput.value = '';
    }

    fileInput.addEventListener('change', e => addFiles(e.target.files));

    ['dragover', 'dragenter'].forEach(ev =>
      drop.addEventListener(ev, e => { e.preventDefault(); drop.classList.add('drag'); }));
    ['dragleave', 'drop'].forEach(ev =>
      drop.addEventListener(ev, e => { e.preventDefault(); drop.classList.remove('drag'); }));
    drop.addEventListener('drop', e => addFiles(e.dataTransfer.files));

    function xhrPost(url, formData) {
      return new Promise((resolve, reject) => {
        const xhr = new XMLHttpRequest();
        xhr.open('POST', url);
        xhr.responseType = 'blob';
        xhr.upload.onprogress = (e) => {
          if (e.lengthComputable) {
            // Reserve 0–70% for upload, 70–95% for server convert (indeterminate pulse).
            setProgress((e.loaded / e.total) * 70);
            status.className = 'info';
            status.textContent = `上传中… ${Math.round((e.loaded / e.total) * 100)}%`;
          }
        };
        xhr.upload.onload = () => {
          setProgress(75);
          status.className = 'info';
          status.textContent = '上传完成，正在转换…';
        };
        xhr.onload = () => {
          setProgress(100);
          resolve(xhr);
        };
        xhr.onerror = () => reject(new Error('网络错误'));
        xhr.onabort = () => reject(new Error('已取消'));
        xhr.send(formData);
      });
    }

    btn.addEventListener('click', async () => {
      if (!selected.length) return;
      persistOpts();
      btn.disabled = true;
      status.className = 'info';
      status.textContent = selected.length > 1
        ? `批量转换中（${selected.length} 个）…`
        : '准备上传…';
      setProgress(2);

      const fd = new FormData();
      const multi = selected.length > 1;
      if (multi) {
        selected.forEach(f => fd.append('files', f));
      } else {
        fd.append('file', selected[0]);
      }
      const range = pageRange.value.trim();
      if (range) fd.append('page_range', range);
      fd.append('page_breaks', pageBreaks.checked ? 'true' : 'false');

      const url = multi ? '/tools/pdf2word/convert-batch' : '/tools/pdf2word/convert';
      try {
        const xhr = await xhrPost(url, fd);
        if (xhr.status < 200 || xhr.status >= 300) {
          let msg = `HTTP ${xhr.status}`;
          try {
            const text = await xhr.response.text();
            const err = JSON.parse(text);
            msg = errDetail(err.detail) || msg;
          } catch (e) { /* keep msg */ }
          throw new Error(msg);
        }
        const blob = xhr.response;
        const fallback = multi
          ? 'pdf2word_batch.zip'
          : selected[0].name.replace(/\.pdf$/i, '') + '.docx';
        const a = document.createElement('a');
        const href = URL.createObjectURL(blob);
        a.href = href;
        a.download = downloadName(xhr.getResponseHeader('content-disposition'), fallback);
        a.click();
        URL.revokeObjectURL(href);

        const pages = xhr.getResponseHeader('X-Pages') || '?';
        const tables = xhr.getResponseHeader('X-Tables') || '0';
        const images = xhr.getResponseHeader('X-Images') || '0';
        const files = xhr.getResponseHeader('X-Files');
        const warns = (xhr.getResponseHeader('X-Warnings') || '').split(',').filter(Boolean);
        let line = multi
          ? `完成：${files || selected.length} 个文件，共 ${pages} 页、${tables} 个表格、${images} 张图。`
          : `完成：${pages} 页、${tables} 个表格、${images} 张图，文件已下载。`;
        if (warns.includes('image_only')) {
          status.className = 'warn';
          status.textContent = line + ' 提示：检测到纯图片/扫描页，已按图片嵌入（无 OCR）。';
        } else {
          status.className = 'ok';
          status.textContent = line;
        }
      } catch (e) {
        status.className = 'err';
        status.textContent = e.message || String(e);
      } finally {
        hideProgress();
        btn.disabled = selected.length === 0;
      }
    });
  </script>
</body>
</html>
