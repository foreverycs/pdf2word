<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="图片格式转换 — JPEG / PNG / WebP / GIF / BMP / TIFF / ICO 互转" />
  <title>图片格式转换 — 工具集</title>
  <link rel="stylesheet" href="{{ static_url('/static/css/tokens.css') }}" />
  <link rel="stylesheet" href="{{ static_url('/static/css/layout.css') }}" />
  <style>
    :root {
      --c: #0d9488;
      --c2: #14b8a6;
      --c-soft: #f0fdfa;
      --c-border: #99f6e4;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--font);
      color: var(--ink);
      min-height: 100vh;
      background: var(--bg);
    }
    .bg {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background:
        radial-gradient(ellipse 70% 50% at 12% 8%, rgba(20, 184, 166, 0.18), transparent 55%),
        radial-gradient(ellipse 55% 40% at 92% 10%, rgba(13, 148, 136, 0.1), transparent 50%),
        linear-gradient(165deg, #f0fdfa 0%, #eef2f7 45%, #f5f7fb 100%);
    }
    .shell { position: relative; z-index: 1; width: 100%; }
    .nav {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 14px; gap: 12px;
    }
    .back {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 13px; font-weight: 600; color: var(--muted);
      text-decoration: none; padding: 8px 12px;
      background: var(--surface); border: 1px solid var(--line);
      border-radius: 999px; backdrop-filter: blur(10px);
      transition: color .15s, border-color .15s, background .15s;
    }
    .back:hover { color: var(--c); border-color: var(--c-border); background: #fff; }
    .back svg { width: 15px; height: 15px; }
    .chip {
      font-size: 11px; font-weight: 700; color: var(--c);
      background: var(--c-soft); border: 1px solid var(--c-border);
      padding: 6px 11px; border-radius: 999px;
    }

    .card {
      background: #fff;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 24px 24px 20px;
      overflow: hidden;
      position: relative;
    }
    .card::before {
      content: "";
      position: absolute; left: 0; right: 0; top: 0; height: 3px;
      background: linear-gradient(90deg, var(--c), var(--c2), #5eead4);
    }
    .card-head {
      display: flex; gap: 14px; align-items: flex-start;
      margin-bottom: 16px;
    }
    .icon {
      width: 48px; height: 48px; border-radius: 14px; flex-shrink: 0;
      display: grid; place-items: center; font-size: 22px;
      background: linear-gradient(145deg, var(--c2), var(--c));
      box-shadow: 0 10px 22px rgba(13, 148, 136, 0.28),
        inset 0 1px 0 rgba(255,255,255,0.28);
    }
    .card-head h1 {
      font-size: 1.25rem; font-weight: 750; letter-spacing: -0.02em;
      margin-bottom: 4px; line-height: 1.2;
    }
    .card-head p { font-size: 13px; color: var(--muted); line-height: 1.55; }

    .features {
      display: flex; flex-wrap: wrap; gap: 6px;
      margin: -2px 0 18px;
    }
    .feat {
      font-size: 11px; font-weight: 600; color: #475569;
      background: #f8fafc; border: 1px solid #eef2f7;
      padding: 4px 9px; border-radius: 8px;
    }

    .drop {
      display: block; width: 100%; cursor: pointer;
      border: 2px dashed var(--c-border);
      border-radius: 16px; padding: 28px 18px;
      text-align: center; background: linear-gradient(180deg, #fafbff 0%, #f0fdfa 100%);
      transition: border-color .15s, background .15s, box-shadow .15s;
    }
    .drop:hover, .drop.drag {
      border-color: var(--c);
      background: var(--c-soft);
      box-shadow: 0 0 0 4px rgba(13, 148, 136, 0.08);
    }
    .drop-icon {
      width: 48px; height: 48px; margin: 0 auto 12px;
      border-radius: 14px; display: grid; place-items: center;
      background: #fff; border: 1px solid var(--c-border);
      color: var(--c); box-shadow: var(--shadow-sm);
    }
    .drop-icon svg { width: 22px; height: 22px; }
    .drop-title { font-size: 14px; font-weight: 600; color: var(--ink-2); }
    .drop-title strong { color: var(--c); }
    .drop-hint { margin-top: 6px; font-size: 12px; color: var(--muted-2); }
    input[type=file] { display: none; }

    .preview-wrap {
      display: none;
      margin-top: 14px;
      border: 1px solid #eef2f7;
      border-radius: 16px;
      overflow: hidden;
      background: #f8fafc;
    }
    .preview-wrap.show { display: block; }
    .preview-bar {
      display: flex; align-items: center; justify-content: space-between;
      gap: 10px; padding: 10px 12px;
      border-bottom: 1px solid #eef2f7;
      font-size: 12px; font-weight: 600; color: #475569;
    }
    .preview-bar .meta { color: var(--muted-2); font-weight: 500; }
    .preview-stage {
      display: grid; place-items: center;
      min-height: 160px; max-height: 280px;
      padding: 12px;
      background:
        linear-gradient(45deg, #e2e8f0 25%, transparent 25%),
        linear-gradient(-45deg, #e2e8f0 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, #e2e8f0 75%),
        linear-gradient(-45deg, transparent 75%, #e2e8f0 75%);
      background-size: 16px 16px;
      background-position: 0 0, 0 8px, 8px -8px, -8px 0;
      background-color: #f1f5f9;
    }
    .preview-stage img {
      max-width: 100%; max-height: 250px;
      object-fit: contain;
      border-radius: 8px;
      box-shadow: 0 4px 16px rgba(15, 23, 42, 0.12);
    }

    .opts {
      margin-top: 16px; display: grid; gap: 14px;
      padding: 16px; background: #f8fafc;
      border: 1px solid #eef2f7; border-radius: 16px;
    }
    .opts-title {
      font-size: 11px; font-weight: 700; letter-spacing: 0.04em;
      text-transform: uppercase; color: var(--muted-2);
    }
    .format-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
    }
    @media (max-width: 640px) {
      .format-row { grid-template-columns: repeat(2, 1fr); }
    }
    .f-card {
      position: relative;
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      padding: 12px 10px 10px;
      background: #fff;
      cursor: pointer;
      transition: border-color .15s, box-shadow .15s, background .15s;
      text-align: center;
    }
    .f-card:hover { border-color: var(--c-border); }
    .f-card.active {
      border-color: var(--c);
      background: var(--c-soft);
      box-shadow: 0 0 0 3px rgba(13, 148, 136, 0.12);
    }
    .f-card input { position: absolute; opacity: 0; pointer-events: none; }
    .f-card .fl {
      font-size: 13px; font-weight: 750; color: var(--ink); margin-bottom: 2px;
    }
    .f-card .fh {
      font-size: 10px; color: var(--muted); line-height: 1.35; font-weight: 500;
    }
    .opts .check {
      display: flex; align-items: center; gap: 10px;
      font-size: 13px; font-weight: 600; color: var(--ink-2); cursor: pointer;
    }
    .opts .check input {
      width: 16px; height: 16px; accent-color: var(--c); cursor: pointer;
    }
    .opts-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    @media (max-width: 520px) {
      .opts-row { grid-template-columns: 1fr; }
    }
    .opts label.field {
      display: flex; flex-direction: column; gap: 6px;
      font-size: 12px; font-weight: 600; color: #475569;
    }
    .opts input[type=number],
    .opts input[type=color],
    .opts input[type=text] {
      padding: 10px 12px; border: 1px solid #e2e8f0; border-radius: 11px;
      font-size: 13px; font-weight: 500; outline: none; background: #fff;
      color: var(--ink);
      transition: border-color .15s, box-shadow .15s;
    }
    .opts input[type=number]:focus,
    .opts input[type=text]:focus {
      border-color: var(--c2);
      box-shadow: 0 0 0 3px rgba(20, 184, 166, 0.15);
    }
    .bg-row {
      display: flex; align-items: center; gap: 8px;
    }
    .bg-row input[type=color] {
      width: 44px; height: 40px; padding: 2px; cursor: pointer;
      flex-shrink: 0;
    }
    .bg-row input[type=text] { flex: 1; min-width: 0; }
    .opts .hint { color: var(--muted-2); font-size: 11px; font-weight: 500; }
    .lossy-only.hidden { display: none !important; }
    .opts select {
      padding: 10px 12px; border: 1px solid #e2e8f0; border-radius: 11px;
      font-size: 13px; font-weight: 500; outline: none; background: #fff;
      color: var(--ink); cursor: pointer;
      transition: border-color .15s, box-shadow .15s;
    }
    .opts select:focus {
      border-color: var(--c2);
      box-shadow: 0 0 0 3px rgba(20, 184, 166, 0.15);
    }
    .cutout {
      padding: 14px;
      border-radius: 14px;
      border: 1px solid #ccfbf1;
      background: linear-gradient(180deg, #f0fdfa 0%, #fff 100%);
      display: grid;
      gap: 12px;
    }
    .cutout .check strong { font-weight: 750; color: var(--c); }
    .cutout-body { display: grid; gap: 12px; }
    .cutout-body[hidden] { display: none !important; }
    .cutout-tip {
      margin: 0;
      padding: 8px 10px;
      border-radius: 10px;
      background: #fff;
      border: 1px solid #e2e8f0;
      line-height: 1.5;
    }
    .cutout-tip strong { color: var(--c); }
    .opts select {
      padding: 10px 12px; border: 1px solid #e2e8f0; border-radius: 11px;
      font-size: 13px; font-weight: 500; outline: none; background: #fff;
      color: var(--ink); cursor: pointer;
      transition: border-color .15s, box-shadow .15s;
    }
    .opts select:focus {
      border-color: var(--c2);
      box-shadow: 0 0 0 3px rgba(20, 184, 166, 0.15);
    }
    .cutout {
      padding: 14px;
      border-radius: 14px;
      border: 1px solid #ccfbf1;
      background: linear-gradient(180deg, #f0fdfa 0%, #fff 100%);
      display: grid;
      gap: 12px;
    }
    .cutout .check strong { font-weight: 750; color: var(--c); }
    .cutout-body { display: grid; gap: 12px; }
    .cutout-body[hidden] { display: none !important; }
    .cutout-tip {
      margin: 0;
      padding: 8px 10px;
      border-radius: 10px;
      background: #fff;
      border: 1px solid #e2e8f0;
      line-height: 1.5;
    }
    .cutout-tip strong { color: var(--c); }

    #btn {
      width: 100%; margin-top: 18px; padding: 13px 16px; border: 0;
      border-radius: 14px; font-size: 15px; font-weight: 700; cursor: pointer;
      color: #fff;
      background: linear-gradient(135deg, var(--c) 0%, var(--c2) 100%);
      box-shadow: 0 8px 20px rgba(13, 148, 136, 0.32);
      transition: transform .15s, box-shadow .15s, opacity .15s;
    }
    #btn:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 12px 28px rgba(13, 148, 136, 0.4);
    }
    #btn:disabled {
      background: #e2e8f0; color: #94a3b8; box-shadow: none;
      cursor: not-allowed; transform: none;
    }

    .progress {
      display: none; margin-top: 14px; height: 7px;
      background: #eef2f7; border-radius: 999px; overflow: hidden;
    }
    .progress.show { display: block; }
    .progress > i {
      display: block; height: 100%; width: 0%;
      background: linear-gradient(90deg, var(--c), var(--c2), #5eead4);
      border-radius: 999px; transition: width .15s ease;
    }

    #status {
      margin-top: 14px; font-size: 13px; min-height: 20px; line-height: 1.55;
      font-weight: 500;
    }
    #status:not(:empty) {
      padding: 10px 12px; border-radius: 12px; background: #f8fafc;
      border: 1px solid #eef2f7;
    }
    #status.err { color: #b91c1c; background: #fef2f2; border-color: #fecaca; }
    #status.ok { color: #15803d; background: #f0fdf4; border-color: #bbf7d0; }
    #status.info { color: #334155; }

    .stats {
      display: none;
      margin-top: 12px;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }
    .stats.show { display: grid; }
    @media (max-width: 520px) {
      .stats { grid-template-columns: 1fr; }
    }
    .stat {
      padding: 12px;
      border-radius: 12px;
      background: #f8fafc;
      border: 1px solid #eef2f7;
    }
    .stat .k {
      font-size: 11px; font-weight: 700; color: var(--muted-2);
      text-transform: uppercase; letter-spacing: 0.03em;
      margin-bottom: 4px;
    }
    .stat .v {
      font-size: 15px; font-weight: 750; color: var(--ink);
      font-variant-numeric: tabular-nums;
    }

    @media (max-width: 480px) {
      .card { padding: 20px 16px 16px; }
    }
  </style>
  <script>window.__ROOT__ = {{ root_path()|tojson }};</script>
  <script src="{{ static_url('/static/js/upload.js') }}"></script>
</head>
<body>
  <div class="bg" aria-hidden="true"></div>
  <div class="tool-shell">
  <div class="shell">
    <div class="nav">
      <a class="back" href="{{ url_path('/c/office') }}">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M19 12H5M11 18l-6-6 6-6"/>
        </svg>
        办公工具
      </a>
      <span class="chip">JPEG · PNG · WebP · GIF · BMP · TIFF · ICO</span>
    </div>

    <div class="card">
      <div class="card-head">
        <div class="icon" aria-hidden="true">🔄</div>
        <div>
          <h1>图片格式转换</h1>
          <p>在 JPEG、PNG、WebP、GIF、BMP、TIFF、ICO 之间互转。透明通道转 JPEG/BMP 时会铺底色；动图转静态格式仅保留首帧。</p>
        </div>
      </div>

      <div class="features">
        <span class="feat">七种格式</span>
        <span class="feat">保留透明</span>
        <span class="feat">动图 → WebP/GIF</span>
        <span class="feat">质量可调</span>
        <span class="feat">本地处理</span>
      </div>

      <label class="drop" id="drop">
        <input type="file" id="file" accept="image/jpeg,image/png,image/gif,image/webp,image/bmp,image/tiff,image/x-icon,.jpg,.jpeg,.png,.gif,.webp,.bmp,.tif,.tiff,.ico" />
        <div class="drop-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 16V4M7 9l5-5 5 5"/>
            <path d="M4 16v2a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-2"/>
          </svg>
        </div>
        <div class="drop-title">点击或拖拽 <strong>图片文件</strong> 到此处</div>
        <div class="drop-hint">JPEG / PNG / WebP / GIF / BMP / TIFF / ICO · 单文件 ≤ 50 MB</div>
      </label>

      <div class="preview-wrap" id="previewWrap">
        <div class="preview-bar">
          <span id="fileName">—</span>
          <span class="meta" id="fileMeta">—</span>
        </div>
        <div class="preview-stage">
          <img id="previewImg" alt="预览" />
        </div>
      </div>

      <div class="opts">
        <div class="opts-title">目标格式</div>
        <div class="format-row" id="formatRow" role="radiogroup" aria-label="目标格式">
          <label class="f-card" data-f="jpeg" data-lossy="1">
            <input type="radio" name="target" value="jpeg" />
            <div class="fl">JPEG</div>
            <div class="fh">照片 · 无透明</div>
          </label>
          <label class="f-card active" data-f="png" data-lossy="0">
            <input type="radio" name="target" value="png" checked />
            <div class="fl">PNG</div>
            <div class="fh">无损 · 透明</div>
          </label>
          <label class="f-card" data-f="webp" data-lossy="1">
            <input type="radio" name="target" value="webp" />
            <div class="fl">WebP</div>
            <div class="fh">小体积 · 透明</div>
          </label>
          <label class="f-card" data-f="gif" data-lossy="1">
            <input type="radio" name="target" value="gif" />
            <div class="fl">GIF</div>
            <div class="fh">动图 · 调色板</div>
          </label>
          <label class="f-card" data-f="bmp" data-lossy="0">
            <input type="radio" name="target" value="bmp" />
            <div class="fl">BMP</div>
            <div class="fh">无压缩位图</div>
          </label>
          <label class="f-card" data-f="tiff" data-lossy="0">
            <input type="radio" name="target" value="tiff" />
            <div class="fl">TIFF</div>
            <div class="fh">扫描 / 印刷</div>
          </label>
          <label class="f-card" data-f="ico" data-lossy="0">
            <input type="radio" name="target" value="ico" />
            <div class="fl">ICO</div>
            <div class="fh">图标 · ≤256</div>
          </label>
        </div>

        <div class="opts-row lossy-only" id="qualityBlock">
          <label class="field">
            质量（JPEG / WebP）
            <input type="number" id="quality" min="1" max="100" step="1" value="85" />
            <span class="hint">1–100，默认 85。PNG / BMP / TIFF / ICO 忽略此项。</span>
          </label>
          <label class="field" id="flattenBgField">
            透明底色（转 JPEG / BMP 时）
            <div class="bg-row">
              <input type="color" id="bgColor" value="#ffffff" title="选择底色" />
              <input type="text" id="bgText" value="#ffffff" maxlength="20" spellcheck="false" />
            </div>
            <span class="hint">PNG/WebP 有透明通道时，导出到无透明格式会铺此底色。</span>
          </label>
        </div>

        <div class="cutout" id="cutoutBox">
          <label class="check">
            <input type="checkbox" id="makeTransparent" />
            <strong>去底色 → 透明背景</strong>（适合白底/纯色底图标，只保留主体）
          </label>
          <div class="cutout-body" id="cutoutBody" hidden>
            <div class="opts-row">
              <label class="field">
                底色来源
                <select id="chromaMode">
                  <option value="auto" selected>自动（取四角/边缘）</option>
                  <option value="manual">指定颜色</option>
                </select>
                <span class="hint">图标四周是纯色时用「自动」即可；绿幕/特定色用「指定」。</span>
              </label>
              <label class="field" id="chromaManualField" hidden>
                指定底色
                <div class="bg-row">
                  <input type="color" id="chromaColor" value="#ffffff" title="底色" />
                  <input type="text" id="chromaText" value="#ffffff" maxlength="20" spellcheck="false" />
                </div>
              </label>
            </div>
            <div class="opts-row">
              <label class="field">
                容差（0–100）
                <input type="number" id="tolerance" min="0" max="100" step="1" value="28" />
                <span class="hint">JPEG 白边可调到 30–45；抠多了就调小。默认 28。</span>
              </label>
              <label class="check" style="align-self:end;margin-bottom:4px;">
                <input type="checkbox" id="softEdge" checked />
                柔和边缘（抗锯齿，推荐）
              </label>
            </div>
            <p class="hint cutout-tip">
              推荐导出 <strong>PNG</strong> 或 <strong>WebP</strong>。选 JPEG/BMP 时会自动改为 PNG 以保留透明。
              复杂照片背景（人像抠图）效果有限，更适合图标 / Logo / 纯色底。
            </p>
          </div>
        </div>

        <label class="check">
          <input type="checkbox" id="stripMeta" checked />
          去除 EXIF 等元数据（方向信息会先烘焙进像素）
        </label>
      </div>

      <button id="btn" disabled>开始转换</button>
      <div class="progress" id="progress"><i id="bar"></i></div>
      <div class="stats" id="stats">
        <div class="stat"><div class="k">原始大小</div><div class="v" id="statOrig">—</div></div>
        <div class="stat"><div class="k">转换后</div><div class="v" id="statOut">—</div></div>
        <div class="stat"><div class="k">格式</div><div class="v" id="statFmt">—</div></div>
      </div>
      <div id="status"></div>
    </div>
  </div>
  </div>

  <script>
    const MAX_BYTES = 50 * 1024 * 1024;
    const LS_KEY = "image_convert_opts_v2";
    const LOSSY = { jpeg: 1, webp: 1, gif: 1, png: 0, bmp: 0, tiff: 0, ico: 0 };

    const fileInput = document.getElementById("file");
    const drop = document.getElementById("drop");
    const btn = document.getElementById("btn");
    const status = document.getElementById("status");
    const progress = document.getElementById("progress");
    const bar = document.getElementById("bar");
    const stripMeta = document.getElementById("stripMeta");
    const quality = document.getElementById("quality");
    const bgColor = document.getElementById("bgColor");
    const bgText = document.getElementById("bgText");
    const previewWrap = document.getElementById("previewWrap");
    const previewImg = document.getElementById("previewImg");
    const fileName = document.getElementById("fileName");
    const fileMeta = document.getElementById("fileMeta");
    const stats = document.getElementById("stats");
    const statOrig = document.getElementById("statOrig");
    const statOut = document.getElementById("statOut");
    const statFmt = document.getElementById("statFmt");
    const formatRow = document.getElementById("formatRow");
    const qualityBlock = document.getElementById("qualityBlock");
    const makeTransparent = document.getElementById("makeTransparent");
    const cutoutBody = document.getElementById("cutoutBody");
    const chromaMode = document.getElementById("chromaMode");
    const chromaManualField = document.getElementById("chromaManualField");
    const chromaColor = document.getElementById("chromaColor");
    const chromaText = document.getElementById("chromaText");
    const tolerance = document.getElementById("tolerance");
    const softEdge = document.getElementById("softEdge");

    /** @type {File|null} */
    let selected = null;
    let previewUrl = null;

    const {
      fmtSize, downloadName, xhrPost, bindDropZone, saveBlob, xhrErrorMessage, appUrl,
    } = window.ToolkitUpload;

    function currentTarget() {
      return (formatRow.querySelector("input:checked") || {}).value || "png";
    }

    function syncCutoutUi() {
      var on = !!makeTransparent.checked;
      cutoutBody.hidden = !on;
      chromaManualField.hidden = chromaMode.value !== "manual";
    }

    function syncLossyUi() {
      var t = currentTarget();
      // Quality is only meaningful for jpeg/webp; still show bg for jpeg/bmp.
      var showQ = t === "jpeg" || t === "webp";
      var showBg = t === "jpeg" || t === "bmp" || t === "gif";
      quality.disabled = !showQ;
      quality.parentElement.style.opacity = showQ ? "1" : "0.55";
      bgColor.parentElement.parentElement.style.opacity = showBg ? "1" : "0.55";
    }

    try {
      var saved = JSON.parse(localStorage.getItem(LS_KEY) || "{}");
      if (saved.target) {
        var r = formatRow.querySelector('input[value="' + saved.target + '"]');
        if (r) {
          r.checked = true;
          formatRow.querySelectorAll(".f-card").forEach(function (c) {
            c.classList.toggle("active", c.getAttribute("data-f") === saved.target);
          });
        }
      }
      if (typeof saved.quality === "number" || typeof saved.quality === "string") {
        var qv = parseInt(saved.quality, 10);
        if (!isNaN(qv) && qv >= 1 && qv <= 100) quality.value = String(qv);
      }
      if (typeof saved.stripMeta === "boolean") stripMeta.checked = saved.stripMeta;
      if (typeof saved.background === "string" && saved.background) {
        bgText.value = saved.background;
        if (/^#[0-9a-fA-F]{6}$/.test(saved.background)) bgColor.value = saved.background;
      }
      if (typeof saved.makeTransparent === "boolean") makeTransparent.checked = saved.makeTransparent;
      if (saved.chromaMode === "auto" || saved.chromaMode === "manual") chromaMode.value = saved.chromaMode;
      if (typeof saved.chromaKey === "string" && saved.chromaKey) {
        chromaText.value = saved.chromaKey;
        if (/^#[0-9a-fA-F]{6}$/.test(saved.chromaKey)) chromaColor.value = saved.chromaKey;
      }
      if (typeof saved.tolerance === "number" || typeof saved.tolerance === "string") {
        var tv = parseInt(saved.tolerance, 10);
        if (!isNaN(tv) && tv >= 0 && tv <= 100) tolerance.value = String(tv);
      }
      if (typeof saved.softEdge === "boolean") softEdge.checked = saved.softEdge;
    } catch (e) { /* ignore */ }
    syncLossyUi();
    syncCutoutUi();

    function persistOpts() {
      try {
        localStorage.setItem(LS_KEY, JSON.stringify({
          target: currentTarget(),
          quality: parseInt(quality.value, 10) || 85,
          stripMeta: !!stripMeta.checked,
          background: bgText.value || "#ffffff",
          makeTransparent: !!makeTransparent.checked,
          chromaMode: chromaMode.value || "auto",
          chromaKey: chromaText.value || "#ffffff",
          tolerance: parseInt(tolerance.value, 10) || 28,
          softEdge: !!softEdge.checked,
        }));
      } catch (e) { /* ignore */ }
    }

    formatRow.addEventListener("change", function (e) {
      var input = e.target;
      if (!input || input.name !== "target") return;
      formatRow.querySelectorAll(".f-card").forEach(function (c) {
        c.classList.toggle("active", c.getAttribute("data-f") === input.value);
      });
      syncLossyUi();
      persistOpts();
    });
    quality.addEventListener("change", persistOpts);
    quality.addEventListener("blur", persistOpts);
    stripMeta.addEventListener("change", persistOpts);
    makeTransparent.addEventListener("change", function () {
      syncCutoutUi();
      persistOpts();
    });
    chromaMode.addEventListener("change", function () {
      syncCutoutUi();
      persistOpts();
    });
    tolerance.addEventListener("change", persistOpts);
    tolerance.addEventListener("blur", persistOpts);
    softEdge.addEventListener("change", persistOpts);
    bgColor.addEventListener("input", function () {
      bgText.value = bgColor.value;
      persistOpts();
    });
    bgText.addEventListener("change", function () {
      var v = (bgText.value || "").trim();
      if (/^#[0-9a-fA-F]{6}$/.test(v)) bgColor.value = v;
      persistOpts();
    });
    chromaColor.addEventListener("input", function () {
      chromaText.value = chromaColor.value;
      persistOpts();
    });
    chromaText.addEventListener("change", function () {
      var v = (chromaText.value || "").trim();
      if (/^#[0-9a-fA-F]{6}$/.test(v)) chromaColor.value = v;
      persistOpts();
    });

    function setProgress(pct) {
      progress.classList.add("show");
      bar.style.width = Math.max(0, Math.min(100, pct)) + "%";
    }
    function hideProgress() {
      progress.classList.remove("show");
      bar.style.width = "0%";
    }
    function setStatus(text, cls) {
      status.textContent = text || "";
      status.className = cls || "";
    }
    function clearStats() {
      stats.classList.remove("show");
      statOrig.textContent = "—";
      statOut.textContent = "—";
      statFmt.textContent = "—";
    }
    function showStats(orig, out, fmt) {
      statOrig.textContent = fmtSize(orig);
      statOut.textContent = fmtSize(out);
      statFmt.textContent = (fmt || "—").toUpperCase();
      stats.classList.add("show");
    }

    function acceptFile(file) {
      if (!file) return false;
      if (file.size > MAX_BYTES) {
        setStatus("文件过大（最大 50 MB）", "err");
        return false;
      }
      var name = (file.name || "").toLowerCase();
      var okExt = /\.(jpe?g|png|gif|webp|bmp|tiff?|ico)$/i.test(name);
      var okType = /^(image\/(jpeg|png|gif|webp|bmp|tiff|x-icon|vnd\.microsoft\.icon)|application\/octet-stream)$/i.test(file.type || "");
      if (!okExt && !okType) {
        setStatus("仅支持 JPEG、PNG、WebP、GIF、BMP、TIFF、ICO", "err");
        return false;
      }
      return true;
    }

    function setFile(file) {
      if (!acceptFile(file)) return;
      selected = file;
      btn.disabled = false;
      clearStats();
      setStatus("");
      fileName.textContent = file.name;
      fileMeta.textContent = fmtSize(file.size);
      if (previewUrl) {
        URL.revokeObjectURL(previewUrl);
        previewUrl = null;
      }
      previewUrl = URL.createObjectURL(file);
      previewImg.src = previewUrl;
      previewImg.onerror = function () {
        previewWrap.classList.remove("show");
      };
      previewImg.onload = function () {
        previewWrap.classList.add("show");
      };
      previewWrap.classList.add("show");
    }

    bindDropZone({
      drop: drop,
      input: fileInput,
      onFiles: function (files) {
        if (files && files[0]) setFile(files[0]);
        fileInput.value = "";
      },
    });

    btn.addEventListener("click", async function () {
      if (!selected) return;
      btn.disabled = true;
      clearStats();
      setStatus("正在转换…", "info");
      setProgress(8);

      var target = currentTarget();
      var punch = !!makeTransparent.checked;
      var fd = new FormData();
      fd.append("file", selected, selected.name);
      fd.append("target_format", target);
      fd.append("quality", String(parseInt(quality.value, 10) || 85));
      fd.append("strip_meta", stripMeta.checked ? "true" : "false");
      fd.append("background", bgText.value || "#ffffff");
      fd.append("make_transparent", punch ? "true" : "false");
      if (punch) {
        var key = chromaMode.value === "manual"
          ? (chromaText.value || "#ffffff")
          : "auto";
        fd.append("chroma_key", key);
        fd.append("tolerance", String(parseInt(tolerance.value, 10) || 28));
        fd.append("soft_edge", softEdge.checked ? "true" : "false");
      }

      try {
        var xhr = await xhrPost(appUrl("/tools/image-convert/convert"), fd, {
          processHint: punch ? "上传完成，正在去底色…" : "上传完成，正在转换…",
          longWaitSec: 12,
          onProgress: function (pct) { setProgress(pct); },
          onStatus: function (text, cls) { setStatus(text, cls || "info"); },
        });
        if (xhr.status >= 200 && xhr.status < 300) {
          var blob = xhr.response;
          var name = downloadName(
            xhr.getResponseHeader("Content-Disposition"),
            selected.name.replace(/\.[^.]+$/, "") + "." + (target === "jpeg" ? "jpg" : target)
          );
          var orig = parseInt(xhr.getResponseHeader("X-Original-Bytes") || "0", 10);
          var out = parseInt(xhr.getResponseHeader("X-Output-Bytes") || "0", 10);
          var src = xhr.getResponseHeader("X-Source-Format") || "";
          var tgt = xhr.getResponseHeader("X-Target-Format") || target;
          if (!orig) orig = selected.size;
          if (!out && blob && blob.size) out = blob.size;
          showStats(orig, out, tgt);
          saveBlob(blob, name);
          var msg = punch ? "去底完成" : "转换完成";
          if (src && tgt) msg += " · " + src.toUpperCase() + " → " + tgt.toUpperCase();
          if (orig && out) msg += " · " + fmtSize(orig) + " → " + fmtSize(out);
          if (punch) msg += " · 透明背景";
          setStatus(msg, "ok");
          setProgress(100);
        } else {
          setStatus(xhrErrorMessage(xhr) || "转换失败", "err");
        }
      } catch (err) {
        setStatus((err && err.message) || "网络错误", "err");
      } finally {
        btn.disabled = !selected;
        setTimeout(hideProgress, 600);
      }
    });
  </script>
</body>
</html>
