<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Base64 编码解码 — 文本与文件，标准 / URL-safe" />
  <title>Base64 编解码 — 工具集</title>
  <link rel="stylesheet" href="/static/css/tokens.css" />
  <link rel="stylesheet" href="/static/css/layout.css" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--font);
      color: var(--ink);
      min-height: 100vh;
      background: var(--bg);
    }
    .bg {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background:
        radial-gradient(ellipse 70% 50% at 15% 8%, rgba(245, 158, 11, 0.22), transparent 55%),
        radial-gradient(ellipse 55% 40% at 90% 10%, rgba(99, 102, 241, 0.14), transparent 50%),
        linear-gradient(165deg, #fffbeb 0%, #eef2f7 45%, #f5f7fb 100%);
    }
    .shell {
      position: relative;
      z-index: 1;
      width: 100%;
    }
    .nav {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 14px; gap: 12px;
    }
    .back {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 13px; font-weight: 600; color: var(--muted);
      text-decoration: none; padding: 8px 12px;
      background: var(--surface); border: 1px solid var(--line);
      border-radius: 999px; backdrop-filter: blur(10px);
      transition: color .15s, border-color .15s, background .15s;
    }
    .back:hover { color: #d97706; border-color: #fde68a; background: #fff; }
    .back svg { width: 15px; height: 15px; }
    .chip {
      font-size: 11px; font-weight: 700; color: #b45309;
      background: #fffbeb; border: 1px solid #fde68a;
      padding: 6px 11px; border-radius: 999px;
    }

    .card {
      background: #fff;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 24px 24px 20px;
      overflow: hidden;
      position: relative;
    }
    .card::before {
      content: "";
      position: absolute; left: 0; right: 0; top: 0; height: 3px;
      background: linear-gradient(90deg, #d97706, #f59e0b, #4f46e5);
    }
    .card-head {
      display: flex; gap: 14px; align-items: flex-start;
      margin-bottom: 18px;
    }
    .icon {
      width: 48px; height: 48px; border-radius: 14px;
      display: grid; place-items: center; font-size: 22px; flex-shrink: 0;
      background: linear-gradient(145deg, #fbbf24, #d97706);
      box-shadow: 0 10px 22px rgba(217, 119, 6, 0.3);
    }
    .card-head h1 {
      font-size: 1.25rem; font-weight: 750; letter-spacing: -0.02em;
      margin-bottom: 4px;
    }
    .card-head p { font-size: 13px; color: var(--muted); line-height: 1.55; }

    .mode-tabs {
      display: flex; gap: 6px; padding: 4px;
      background: #f8fafc; border: 1px solid #eef2f7;
      border-radius: 12px; margin-bottom: 16px; width: fit-content;
    }
    .mode-tab {
      font: inherit; font-size: 13px; font-weight: 650;
      padding: 8px 16px; border: none; border-radius: 9px;
      background: transparent; color: var(--muted); cursor: pointer;
      transition: background .15s, color .15s, box-shadow .15s;
    }
    .mode-tab.active {
      background: #fff; color: #b45309;
      box-shadow: 0 1px 4px rgba(15, 23, 42, 0.08);
    }

    .opts {
      display: flex; flex-wrap: wrap; gap: 10px 14px;
      margin-bottom: 14px; align-items: flex-end;
    }
    .field {
      display: flex; flex-direction: column; gap: 5px;
      font-size: 12px; font-weight: 650; color: #475569;
    }
    .field select, .field input[type="number"] {
      font: inherit; font-size: 13px; font-weight: 500;
      padding: 8px 10px; border-radius: 10px;
      border: 1px solid #e2e8f0; background: #fff; color: var(--ink);
      min-width: 120px;
    }
    .field select:focus, .field input:focus, textarea:focus {
      outline: 2px solid rgba(217, 119, 6, 0.35);
      outline-offset: 1px;
    }
    .check {
      display: inline-flex; align-items: center; gap: 7px;
      font-size: 12.5px; font-weight: 600; color: #475569;
      cursor: pointer; user-select: none; padding-bottom: 2px;
    }

    .panes {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }
    @media (max-width: 760px) {
      .panes { grid-template-columns: 1fr; }
    }
    .pane {
      display: flex; flex-direction: column; gap: 8px; min-width: 0;
    }
    .pane-label {
      display: flex; align-items: center; justify-content: space-between;
      font-size: 12px; font-weight: 700; color: #475569;
    }
    .pane-actions { display: flex; gap: 6px; }
    .mini {
      font: inherit; font-size: 11px; font-weight: 650;
      padding: 4px 9px; border-radius: 8px; cursor: pointer;
      border: 1px solid #e2e8f0; background: #f8fafc; color: #475569;
      transition: background .12s, border-color .12s, color .12s;
    }
    .mini:hover { background: #fff; border-color: #fcd34d; color: #b45309; }
    textarea {
      width: 100%; min-height: 220px; resize: vertical;
      font-family: var(--mono); font-size: 12.5px; line-height: 1.55;
      padding: 12px 14px; border-radius: 14px;
      border: 1px solid #e2e8f0; background: #fafbfc; color: var(--ink);
    }
    textarea[readonly] { background: #f8fafc; color: #0f172a; }

    .actions {
      display: flex; flex-wrap: wrap; gap: 10px;
      margin-top: 16px; align-items: center;
    }
    .btn {
      font: inherit; font-size: 14px; font-weight: 700;
      padding: 11px 20px; border-radius: 12px; border: none;
      cursor: pointer; color: #fff;
      background: linear-gradient(135deg, #d97706, #f59e0b);
      box-shadow: 0 8px 20px rgba(217, 119, 6, 0.3);
      transition: transform .15s, box-shadow .15s, opacity .15s;
    }
    .btn:hover { transform: translateY(-1px); box-shadow: 0 10px 24px rgba(217, 119, 6, 0.38); }
    .btn:disabled { opacity: 0.55; cursor: not-allowed; transform: none; }
    .btn-ghost {
      color: #475569; background: #fff;
      border: 1px solid #e2e8f0; box-shadow: none;
    }
    .btn-ghost:hover { border-color: #fcd34d; color: #b45309; box-shadow: none; }

    .file-row {
      display: flex; flex-wrap: wrap; gap: 10px; align-items: center;
      min-height: 28px;
      margin-bottom: 12px;
      transition: opacity .12s ease;
    }
    /* Keep the file row's footprint in decode mode so the card and text panes
       do not jump vertically when switching between encode and decode. */
    .file-row.is-inactive {
      visibility: hidden;
      opacity: 0;
      pointer-events: none;
    }
    .file-row input[type="file"] { font-size: 12.5px; max-width: 100%; }
    .meta {
      margin-top: 12px; font-size: 12px; color: var(--muted);
      display: flex; flex-wrap: wrap; gap: 8px 14px;
    }
    .meta strong { color: var(--ink-2); font-weight: 700; }
    .status {
      margin-top: 12px; font-size: 13px; line-height: 1.5;
      padding: 10px 12px; border-radius: 12px;
      display: none;
    }
    .status.show { display: block; }
    .status.ok { background: #ecfdf5; color: #047857; border: 1px solid #a7f3d0; }
    .status.err { background: #fef2f2; color: #b91c1c; border: 1px solid #fecaca; }
    .status.info { background: #fffbeb; color: #92400e; border: 1px solid #fde68a; }

    .tips {
      margin-top: 14px; font-size: 12px; color: var(--muted-2); line-height: 1.55;
    }

    @keyframes enter {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="bg" aria-hidden="true"></div>
  <div class="tool-shell">
  <div class="shell">
    <div class="nav">
      <a class="back" href="/c/coding">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M19 12H5M11 18l-6-6 6-6"/>
        </svg>
        编码工具
      </a>
      <span class="chip">编码工具 · Base64</span>
    </div>

    <div class="card">
      <div class="card-head">
        <div class="icon" aria-hidden="true">🔑</div>
        <div>
          <h1>Base64 编解码</h1>
          <p>文本即时编码 / 解码，支持标准与 URL-safe、换行折叠，也可对小文件编码。</p>
        </div>
      </div>

      <div class="mode-tabs" role="tablist">
        <button type="button" class="mode-tab active" data-mode="encode" role="tab">编码 Encode</button>
        <button type="button" class="mode-tab" data-mode="decode" role="tab">解码 Decode</button>
      </div>

      <div class="opts">
        <label class="field">字符集
          <select id="charset">
            <option value="utf-8" selected>UTF-8</option>
            <option value="utf-16">UTF-16</option>
            <option value="latin-1">Latin-1</option>
            <option value="ascii">ASCII</option>
          </select>
        </label>
        <label class="field">变体
          <select id="variant">
            <option value="standard" selected>Standard (+/)</option>
            <option value="urlsafe">URL-safe (-_)</option>
          </select>
        </label>
        <label class="field" id="wrapField">换行
          <select id="wrap">
            <option value="0" selected>不换行</option>
            <option value="64">每 64 字符</option>
            <option value="76">每 76 字符 (MIME)</option>
          </select>
        </label>
        <label class="check" id="strictWrap">
          <input type="checkbox" id="strict" />
          严格校验
        </label>
      </div>

      <div class="file-row" id="fileRow">
        <input type="file" id="file" />
        <span class="tips" style="margin:0">可选：上传 ≤ 5 MB 文件直接编码（优先于左侧文本）</span>
      </div>

      <div class="panes">
        <div class="pane">
          <div class="pane-label">
            <span id="inputLabel">明文</span>
            <div class="pane-actions">
              <button type="button" class="mini" id="btnSample">示例</button>
              <button type="button" class="mini" id="btnClearIn">清空</button>
            </div>
          </div>
          <textarea id="input" placeholder="在此输入要编码的文本…" spellcheck="false"></textarea>
        </div>
        <div class="pane">
          <div class="pane-label">
            <span id="outputLabel">Base64</span>
            <div class="pane-actions">
              <button type="button" class="mini" id="btnCopy">复制</button>
              <button type="button" class="mini" id="btnClearOut">清空</button>
            </div>
          </div>
          <textarea id="output" readonly placeholder="结果将显示在这里…" spellcheck="false"></textarea>
        </div>
      </div>

      <div class="actions">
        <button type="button" class="btn" id="btnRun">编码</button>
        <button type="button" class="btn btn-ghost" id="btnSwap">交换输入/输出</button>
      </div>

      <div class="meta" id="meta"></div>
      <div class="status" id="status"></div>
      <p class="tips">
        提示：解码失败时请检查是否选对了变体（URL-safe 使用 <code>-_</code>）。
        二进制内容解码后可查看 hex；文本以所选字符集解释。
      </p>
    </div>
  </div>
  </div>

  <script>
    const modeTabs = document.querySelectorAll('.mode-tab');
    const input = document.getElementById('input');
    const output = document.getElementById('output');
    const charset = document.getElementById('charset');
    const variant = document.getElementById('variant');
    const wrap = document.getElementById('wrap');
    const strict = document.getElementById('strict');
    const fileInput = document.getElementById('file');
    const fileRow = document.getElementById('fileRow');
    const wrapField = document.getElementById('wrapField');
    const strictWrap = document.getElementById('strictWrap');
    const btnRun = document.getElementById('btnRun');
    const btnSwap = document.getElementById('btnSwap');
    const btnCopy = document.getElementById('btnCopy');
    const btnSample = document.getElementById('btnSample');
    const btnClearIn = document.getElementById('btnClearIn');
    const btnClearOut = document.getElementById('btnClearOut');
    const meta = document.getElementById('meta');
    const status = document.getElementById('status');
    const inputLabel = document.getElementById('inputLabel');
    const outputLabel = document.getElementById('outputLabel');

    let mode = 'encode';

    function setStatus(kind, text) {
      status.className = 'status show ' + kind;
      status.textContent = text;
    }
    function clearStatus() {
      status.className = 'status';
      status.textContent = '';
    }

    function applyMode(next) {
      mode = next;
      modeTabs.forEach((t) => {
        const on = t.getAttribute('data-mode') === mode;
        t.classList.toggle('active', on);
      });
      if (mode === 'encode') {
        inputLabel.textContent = '明文';
        outputLabel.textContent = 'Base64';
        input.placeholder = '在此输入要编码的文本…';
        btnRun.textContent = '编码';
        fileRow.classList.remove('is-inactive');
        fileRow.setAttribute('aria-hidden', 'false');
        wrapField.style.display = '';
        strictWrap.style.display = 'none';
      } else {
        inputLabel.textContent = 'Base64';
        outputLabel.textContent = '明文 / 结果';
        input.placeholder = '粘贴 Base64 字符串…';
        btnRun.textContent = '解码';
        fileRow.classList.add('is-inactive');
        fileRow.setAttribute('aria-hidden', 'true');
        wrapField.style.display = 'none';
        strictWrap.style.display = '';
        fileInput.value = '';
      }
      clearStatus();
      meta.innerHTML = '';
    }

    modeTabs.forEach((tab) => {
      tab.addEventListener('click', () => applyMode(tab.getAttribute('data-mode')));
    });
    applyMode('encode');

    btnClearIn.addEventListener('click', () => { input.value = ''; fileInput.value = ''; });
    btnClearOut.addEventListener('click', () => { output.value = ''; meta.innerHTML = ''; });

    btnSample.addEventListener('click', () => {
      if (mode === 'encode') {
        input.value = 'Hello, 工具集! 👋';
      } else {
        input.value = 'SGVsbG8sIOaJi+acuumHkeS/oSDwn5iC';
      }
    });

    btnSwap.addEventListener('click', () => {
      const a = input.value;
      input.value = output.value;
      output.value = a;
      applyMode(mode === 'encode' ? 'decode' : 'encode');
    });

    btnCopy.addEventListener('click', async () => {
      const text = output.value;
      if (!text) return;
      try {
        await navigator.clipboard.writeText(text);
        setStatus('ok', '已复制到剪贴板');
      } catch (e) {
        output.select();
        document.execCommand('copy');
        setStatus('ok', '已复制');
      }
    });

    function showMeta(obj) {
      const parts = [];
      if (obj.input_bytes != null) parts.push(`输入 <strong>${obj.input_bytes}</strong> 字节`);
      if (obj.input_chars != null) parts.push(`输入 <strong>${obj.input_chars}</strong> 字符`);
      if (obj.output_chars != null) parts.push(`输出 <strong>${obj.output_chars}</strong> 字符`);
      if (obj.raw_bytes != null) parts.push(`解码 <strong>${obj.raw_bytes}</strong> 字节`);
      if (obj.variant) parts.push(`变体 <strong>${obj.variant}</strong>`);
      if (obj.charset) parts.push(`字符集 <strong>${obj.charset}</strong>`);
      if (obj.filename) parts.push(`文件 <strong>${obj.filename}</strong>`);
      if (obj.text_ok === false) parts.push(`文本解释失败（已返回 hex）`);
      meta.innerHTML = parts.join(' · ');
    }

    btnRun.addEventListener('click', async () => {
      clearStatus();
      btnRun.disabled = true;
      try {
        const fd = new FormData();
        fd.append('charset', charset.value);
        fd.append('variant', variant.value);

        let url;
        if (mode === 'encode') {
          url = '/tools/base64/encode';
          fd.append('wrap', wrap.value);
          const f = fileInput.files && fileInput.files[0];
          if (f) {
            fd.append('file', f);
          } else {
            fd.append('text', input.value);
          }
        } else {
          url = '/tools/base64/decode';
          fd.append('text', input.value);
          fd.append('strict', strict.checked ? 'true' : 'false');
        }

        const res = await fetch(url, { method: 'POST', body: fd });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) {
          const detail = data.detail;
          const msg = typeof detail === 'string'
            ? detail
            : (Array.isArray(detail) ? detail.map(d => d.msg || d).join('; ') : (detail || `HTTP ${res.status}`));
          throw new Error(msg);
        }

        if (mode === 'encode') {
          output.value = data.result || '';
          setStatus('ok', '编码完成');
        } else {
          if (data.text_ok) {
            output.value = data.result || '';
            setStatus('ok', '解码完成');
          } else {
            output.value = data.result || '';
            if (data.raw_hex) {
              output.value = (output.value ? output.value + '\n\n' : '') +
                '/* raw hex */\n' + data.raw_hex;
            }
            setStatus('info', data.text_error
              ? '字节已解码，但无法按当前字符集显示为文本：' + data.text_error
              : '已解码为原始字节（见 hex）');
          }
        }
        showMeta(data);
      } catch (err) {
        setStatus('err', err.message || String(err));
      } finally {
        btnRun.disabled = false;
      }
    });

    // Ctrl/Cmd + Enter
    input.addEventListener('keydown', (e) => {
      if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
        e.preventDefault();
        btnRun.click();
      }
    });
  </script>
</body>
</html>
