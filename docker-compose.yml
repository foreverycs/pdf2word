services:
  toolbox:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # China-friendly pull of library/python (avoids docker.io timeout).
        # Alternatives if this mirror fails:
        #   docker.1ms.run/library/python:3.12-slim
        #   dockerproxy.com/library/python:3.12-slim
        #   python:3.12-slim   # only if the host has a working registry-mirror
        PYTHON_IMAGE: docker.m.daocloud.io/library/python:3.12-slim
    image: pdf2word-toolbox:latest
    ports:
      - "8002:8000"
    # Project .env is loaded by the app. Prefer env_file over hardcoding secrets.
    # Variables listed under environment: OVERRIDE .env unless DOTENV_OVERRIDE=1.
    env_file:
      - .env
    environment:
      LIBREOFFICE_PATH: /usr/bin/soffice
      HOME: /tmp
      SAL_USE_VCLPLUGIN: svp
      UPLOAD_RETENTION_DAYS: "5"
      UPLOAD_FILE_DIR: /app/file
      CONVERT_CONCURRENCY: "2"
      # Let container .env (env_file) win for admin keys when both exist:
      DOTENV_OVERRIDE: "1"
      # Fallback only if .env missing these keys (dev). Production: put secrets in .env only.
      ALLOW_INSECURE_ADMIN: ${ALLOW_INSECURE_ADMIN:-1}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123}
      ADMIN_SECRET: ${ADMIN_SECRET:-dev-only-change-me-use-long-random}
    volumes:
      # Persist upload history on the host
      - ./file:/app/file
      # Optional: mount host .env so edits apply after container restart
      - ./.env:/app/.env:ro
    mem_limit: 1g
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5)",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s
